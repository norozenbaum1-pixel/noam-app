<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noam App</title>

<style>
body {
  margin: 0;
  font-family: 'Arial';
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  direction: rtl;
  text-align: center;
}

h1 {
  margin-top: 30px;
  font-size: 28px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px;
  font-size: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.counter {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.8;
}

.hidden {
  display: none;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 15px;
  border: none;
  background: white;
  color: black;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="home">
  <h1>נועם המושלם</h1>

  <div class="grid">
    <div class="card" onclick="openWorkouts()">
      אימונים
      <div class="counter" id="counter">0/3</div>
    </div>

    <div class="card">תזונה</div>
    <div class="card">מסחר</div>
    <div class="card">פתקים</div>
    <div class="card">יעדים</div>
    <div class="card">עוד</div>
  </div>
</div>

<div id="workouts" class="hidden">
  <h1>אימונים</h1>

  <div class="counter" id="weekCounter">0/3</div>

  <button onclick="addWorkout()">סיימתי אימון</button>
  <button onclick="removeWorkout()">בטל</button>
  <br>
  <button onclick="goBack()">חזור</button>
</div>

<script>
let count = localStorage.getItem("workouts") || 0;
count = Number(count);

function updateUI() {
  document.getElementById("counter").innerText = count + "/3";
  document.getElementById("weekCounter").innerText = count + "/3";
}

function openWorkouts() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("workouts").classList.remove("hidden");
}

function goBack() {
  document.getElementById("workouts").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

function addWorkout() {
  if (count < 3) count++;
  localStorage.setItem("workouts", count);
  updateUI();
}

function removeWorkout() {
  if (count > 0) count--;
  localStorage.setItem("workouts", count);
  updateUI();
}

updateUI();
</script>

</body>
</html>
