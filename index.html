<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>היום שלי</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      direction: rtl;
      background: linear-gradient(135deg, #6a5cff 0%, #8b5cf6 35%, #ec4899 70%, #22c55e 100%);
      min-height: 100vh;
      color: white;
    }

    .page {
      min-height: 100vh;
      padding: 24px 18px 32px;
    }

    .hidden {
      display: none;
    }

    .main-title {
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      margin: 18px 0 28px;
      letter-spacing: 0.5px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.18);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      max-width: 460px;
      margin: 0 auto;
    }

    .home-card, .workout-card, .bonus-card {
      border-radius: 28px;
      padding: 20px 14px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.16);
      text-align: center;
    }

    .home-card {
      min-height: 125px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s ease;
    }

    .home-card:active {
      transform: scale(0.98);
    }

    .home-card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .home-card-sub {
      font-size: 15px;
      opacity: 0.92;
    }

    .top-bar {
      max-width: 460px;
      margin: 0 auto 18px;
      display: flex;
      justify-content: flex-start;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 999px;
      background: white;
      color: #9ca3af;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .section-title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      margin: 6px 0 22px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.15);
    }

    .workouts-wrap {
      max-width: 460px;
      margin: 0 auto;
    }

    .three-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .workout-card {
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .workout-card.done {
      background: rgba(255,255,255,0.28);
      border: 2px solid rgba(255,255,255,0.45);
    }

    .bonus-card {
      margin-top: 14px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      font-weight: 700;
      cursor: pointer;
    }

    .bonus-card.done {
      background: rgba(255,255,255,0.28);
      border: 2px solid rgba(255,255,255,0.45);
    }

    .progress-wrap {
      max-width: 460px;
      margin: 18px auto 0;
    }

    .progress-bar-bg {
      width: 100%;
      height: 18px;
      background: rgba(255,255,255,0.22);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.12);
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.25s ease, background 0.25s ease;
      background: #ef4444;
    }

    .progress-text {
      margin-top: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
    }

    .bonus-text {
      margin-top: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff7b2;
      min-height: 26px;
    }
  </style>
</head>
<body>

  <div id="homePage" class="page">
    <div class="main-title">היום שלי</div>

    <div class="grid">
      <div class="home-card" onclick="openWorkouts()">
        <div class="home-card-title">אימונים</div>
        <div class="home-card-sub"><span id="homeCounter">0</span>/3 השבוע</div>
      </div>

      <div class="home-card">
        <div class="home-card-title">תזונה</div>
        <div class="home-card-sub">בקרוב</div>
      </div>

      <div class="home-card">
        <div class="home-card-title">מסחר</div>
        <div class="home-card-sub">בקרוב</div>
      </div>

      <div class="home-card">
        <div class="home-card-title">פתקים</div>
        <div class="home-card-sub">בקרוב</div>
      </div>

      <div class="home-card">
        <div class="home-card-title">משימות</div>
        <div class="home-card-sub">בקרוב</div>
      </div>

      <div class="home-card">
        <div class="home-card-title">עוד</div>
        <div class="home-card-sub">בקרוב</div>
      </div>
    </div>
  </div>

  <div id="workoutsPage" class="page hidden">
    <div class="top-bar">
      <button class="back-btn" onclick="goHome()">←</button>
    </div>

    <div class="section-title">האימונים שלי</div>

    <div class="workouts-wrap">
      <div class="three-grid">
        <div id="workout1" class="workout-card" onclick="toggleWorkout(1)">אימון 1</div>
        <div id="workout2" class="workout-card" onclick="toggleWorkout(2)">אימון 2</div>
        <div id="workout3" class="workout-card" onclick="toggleWorkout(3)">אימון 3</div>
      </div>

      <div id="bonusCard" class="bonus-card" onclick="toggleBonus()">אימון בונוס</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div id="progressFill" class="progress-bar-fill"></div>
      </div>
      <div id="progressText" class="progress-text">0/3</div>
      <div id="bonusText" class="bonus-text"></div>
    </div>
  </div>

  <script>
    const WORKOUTS_KEY = "noam_workouts_v2";
    const BONUS_KEY = "noam_bonus_v2";

    let workouts = JSON.parse(localStorage.getItem(WORKOUTS_KEY)) || [false, false, false];
    let bonusDone = JSON.parse(localStorage.getItem(BONUS_KEY)) || false;

    function saveData() {
      localStorage.setItem(WORKOUTS_KEY, JSON.stringify(workouts));
      localStorage.setItem(BONUS_KEY, JSON.stringify(bonusDone));
    }

    function getCompletedCount() {
      return workouts.filter(Boolean).length;
    }

    function getProgressColor(count) {
      if (count === 1) return "#ef4444";
      if (count === 2) return "#facc15";
      if (count >= 3) return "#22c55e";
      return "#ef4444";
    }

    function updateUI() {
      const count = getCompletedCount();

      document.getElementById("homeCounter").innerText = count;
      document.getElementById("progressText").innerText = count + "/3";

      for (let i = 1; i <= 3; i++) {
        const card = document.getElementById("workout" + i);
        if (workouts[i - 1]) {
          card.classList.add("done");
        } else {
          card.classList.remove("done");
        }
      }

      const fill = document.getElementById("progressFill");
      fill.style.width = (count / 3 * 100) + "%";
      fill.style.background = getProgressColor(count);

      const bonusCard = document.getElementById("bonusCard");
      const bonusText = document.getElementById("bonusText");

      if (bonusDone) {
        bonusCard.classList.add("done");
        bonusText.innerText = "אלוף, ביצעת אימון בונוס";
      } else {
        bonusCard.classList.remove("done");
        bonusText.innerText = "";
      }
    }

    function openWorkouts() {
      document.getElementById("homePage").classList.add("hidden");
      document.getElementById("workoutsPage").classList.remove("hidden");
    }

    function goHome() {
      document.getElementById("workoutsPage").classList.add("hidden");
      document.getElementById("homePage").classList.remove("hidden");
    }

    function toggleWorkout(index) {
      workouts[index - 1] = !workouts[index - 1];
      saveData();
      updateUI();
    }

    function toggleBonus() {
      bonusDone = !bonusDone;
      saveData();
      updateUI();
    }

    updateUI();
  </script>
</body>
</html>
