<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>השבוע שלי</title>

<style>
body {
margin:0;
font-family:Arial;
background:linear-gradient(#0f172a,#1e293b);
color:white;
}

.container {
max-width:420px;
margin:auto;
padding:20px;
}

.title {
font-size:42px;
text-align:center;
margin-bottom:20px;
font-weight:bold;
}

.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card {
background:#1e293b;
padding:20px;
border-radius:20px;
text-align:center;
cursor:pointer;
}

.page {display:none;}
.active {display:block;}

.back {
background:white;
color:black;
border:none;
border-radius:50%;
width:40px;
height:40px;
margin-bottom:10px;
}

.row {
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.done {background:#22c55e;}

.progress {
height:12px;
background:#374151;
border-radius:10px;
overflow:hidden;
margin-top:15px;
}

.progress div {
height:100%;
background:red;
width:0%;
}

.input {
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

</style>
</head>

<body>

<div id="home" class="container active">
<div class="title">השבוע שלי</div>

<div class="grid">
<div class="card" onclick="openPage('workouts')">אימונים</div>
<div class="card" onclick="openPage('trading')">מסחר</div>
<div class="card" onclick="openPage('weekly')">יומן שבועי</div>
<div class="card" onclick="openPage('tasks')">משימות להיום</div>
</div>
</div>

<div id="workouts" class="container page">
<button class="back" onclick="goHome()">←</button>
<h2>האימונים שלי</h2>

<div id="w1" class="row" onclick="toggleWorkout(1)">אימון 1</div>
<div id="w2" class="row" onclick="toggleWorkout(2)">אימון 2</div>
<div id="w3" class="row" onclick="toggleWorkout(3)">אימון 3</div>

<div id="bonus" class="row" onclick="toggleBonus()">אימון בונוס</div>

<div class="progress"><div id="bar"></div></div>
</div>

<div id="trading" class="container page">
<button class="back" onclick="goHome()">←</button>
<h2>מסחר</h2>

<div id="trade"></div>
</div>

<div id="weekly" class="container page">
<button class="back" onclick="goHome()">←</button>
<h2>יומן שבועי</h2>
<div id="days"></div>
</div>

<div id="tasks" class="container page">
<button class="back" onclick="goHome()">←</button>
<h2>משימות להיום</h2>

<input id="title" class="input" placeholder="כותרת">
<input id="time" class="input" type="time">
<textarea id="desc" class="input" placeholder="פירוט"></textarea>

<button onclick="addTask()">הוסף</button>

<div id="taskList"></div>
</div>

<script>

// NAV
function openPage(id){
document.querySelectorAll('.container').forEach(x=>x.classList.remove('active'))
document.getElementById(id).classList.add('active')
}
function goHome(){openPage('home')}

// WORKOUTS
let workouts=JSON.parse(localStorage.getItem("w")||"[0,0,0]")
let bonus=localStorage.getItem("b")=="1"

function toggleWorkout(i){
workouts[i-1]=!workouts[i-1]
saveW()
}
function toggleBonus(){
bonus=!bonus
saveW()
}
function saveW(){
localStorage.setItem("w",JSON.stringify(workouts))
localStorage.setItem("b",bonus?"1":"0")
renderW()
}
function renderW(){
for(let i=1;i<=3;i++){
document.getElementById("w"+i).classList.toggle("done",workouts[i-1])
}
document.getElementById("bonus").classList.toggle("done",bonus)

let count=workouts.filter(x=>x).length
let bar=document.getElementById("bar")
bar.style.width=(count/3*100)+"%"
bar.style.background=count<2?"red":count==2?"orange":"green"
}
renderW()

// TRADING
let days=["שני","שלישי","רביעי","חמישי","שישי"]
let trade=JSON.parse(localStorage.getItem("t")||"{}")

function renderTrade(){
let html=""
days.forEach(d=>{
if(!trade[d]) trade[d]={}
html+=`
<div class="row">
${d}
<button onclick="setT('${d}','yes')">כן</button>
<button onclick="setT('${d}','no')">לא</button>
</div>`
})
document.getElementById("trade").innerHTML=html
}
function setT(day,val){
trade[day]=val
localStorage.setItem("t",JSON.stringify(trade))
}
renderTrade()

// WEEKLY
let weekly=JSON.parse(localStorage.getItem("weekly")||"{}")

function renderDays(){
let html=""
days.forEach(d=>{
html+=`<div class="row" onclick="addWeekly('${d}')">${d}</div>`
})
document.getElementById("days").innerHTML=html
}
function addWeekly(day){
let t=prompt("כותרת?")
if(!t)return
if(!weekly[day]) weekly[day]=[]
weekly[day].push(t)
localStorage.setItem("weekly",JSON.stringify(weekly))
}
renderDays()

// TASKS
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]")

function addTask(){
let t=document.getElementById("title").value
let time=document.getElementById("time").value
let d=document.getElementById("desc").value

tasks.push({t,time,d})
localStorage.setItem("tasks",JSON.stringify(tasks))
renderTasks()
}

function renderTasks(){
let html=""
tasks.forEach(x=>{
html+=`<div class="row">${x.time||""} ${x.t}</div>`
})
document.getElementById("taskList").innerHTML=html
}
renderTasks()

</script>

</body>
</html>
