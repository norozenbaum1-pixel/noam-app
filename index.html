<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>היום שלי</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  direction:rtl;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  font-size:40px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.hidden{display:none;}

.row{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.toggle{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.btn{
  padding:5px 10px;
  border-radius:10px;
  border:none;
}

.active{background:green;}
.red{background:red;}
.yellow{background:orange;}

textarea{
  width:100%;
  border-radius:10px;
  margin-top:5px;
}
</style>
</head>

<body>

<div id="home">
  <div class="container">
    <h1>היום שלי</h1>

    <div class="grid">
      <div class="card" onclick="openTrading()">מסחר</div>
      <div class="card">בקרוב</div>
      <div class="card">בקרוב</div>
      <div class="card">בקרוב</div>
      <div class="card">בקרוב</div>
      <div class="card">בקרוב</div>
    </div>
  </div>
</div>

<div id="trading" class="hidden">
  <div class="container">

    <button onclick="back()">חזור</button>
    <h1>המסחר שלי</h1>

    <div id="days"></div>

    <div class="card">
      <h3>סיכום שבועי</h3>
      <div id="summary"></div>
    </div>

  </div>
</div>

<script>

const days = ["שני","שלישי","רביעי","חמישי","שישי"];
let data = JSON.parse(localStorage.getItem("trade")) || {};

function openTrading(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("trading").classList.remove("hidden");
  render();
}

function back(){
  document.getElementById("trading").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

function toggle(day,key){
  data[day] = data[day] || {};
  data[day][key] = !data[day][key];
  save();
}

function setColor(day,color){
  data[day] = data[day] || {};
  data[day].color = color;
  save();
}

function setNote(day,val){
  data[day] = data[day] || {};
  data[day].note = val;
  save();
}

function save(){
  localStorage.setItem("trade",JSON.stringify(data));
  render();
}

function render(){
  let html="";
  let traded=0,setup=0,green=0,happy=0;

  days.forEach(day=>{
    let d=data[day]||{};

    if(d.trade) traded++;
    if(d.setup) setup++;
    if(d.color==="green") green++;
    if(d.happy) happy++;

    html+=`
    <div class="row">
      <b>${day}</b>

      <div class="toggle">
        סחרתי היום
        <button onclick="toggle('${day}','trade')" class="btn ${d.trade?'active':''}">✓</button>
      </div>

      <div class="toggle">
        פעלתי לפי סטאפ
        <button onclick="toggle('${day}','setup')" class="btn ${d.setup?'active':''}">✓</button>
      </div>

      <div class="toggle">
        יום
        <button onclick="setColor('${day}','green')" class="btn ${d.color==='green'?'active':''}">ירוק</button>
        <button onclick="setColor('${day}','red')" class="btn ${d.color==='red'?'red':''}">אדום</button>
      </div>

      <div class="toggle">
        מרוצה
        <button onclick="toggle('${day}','happy')" class="btn ${d.happy?'active':''}">✓</button>
      </div>

      <textarea placeholder="הערה..." oninput="setNote('${day}',this.value)">${d.note||""}</textarea>
    </div>
    `;
  });

  document.getElementById("days").innerHTML = html;

  document.getElementById("summary").innerHTML = `
  סחרת: ${traded}<br>
  סטאפ: ${setup}<br>
  ירוקים: ${green}<br>
  מרוצה: ${happy}
  `;
}

</script>

</body>
</html>
